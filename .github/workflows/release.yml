name: Release

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, attest & release
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # create the release + tag
      id-token: write        # OIDC token for build provenance
      attestations: write    # write the attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set environments
        run: |
          {
            echo "versionName=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d \")"
            echo "versionCode=$(grep versionCode app/build.gradle | awk '{print $2}')"
            echo "LINE_versionCode=$(grep HOOK_TARGET_VERSION app/build.gradle | awk '{print $4}' | tr -d \'\")"
            echo "commit=$(echo ${{ github.sha }} | cut -c-7)"
            echo "repo=$(echo ${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/})"
          } >> $GITHUB_ENV

      - name: Set LINE versionName
        run: |
          LINE_versionCode="${{ env.LINE_versionCode }}"
          major="${LINE_versionCode:0:2}"
          minor="${LINE_versionCode:2:2}"
          patch="${LINE_versionCode:4:1}"
          if (( ${minor} < 10 )); then
              minor="${LINE_versionCode:2:1}"
          fi
          echo "LINE_versionName=$(echo ${major}.${minor}.${patch})" >> $GITHUB_ENV

      - name: Set release channel
        run: |
          # develop -> pre-release; master (and any other ref) -> full release
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            prerelease=true; makeLatest=false; tag="${{ env.versionName }}-dev-${{ env.commit }}"
          else
            prerelease=false; makeLatest=true; tag="${{ env.versionName }}-${{ env.commit }}"
          fi
          {
            echo "prerelease=${prerelease}"
            echo "makeLatest=${makeLatest}"
            echo "tag=${tag}"
            echo "artifact=${{ env.repo }}-${tag}.apk"
          } >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Check signing secrets
        run: |
          if [ -z "${{ secrets.STORE_FILE }}" ]; then
            echo -e "\nERROR!\nRelease signing secrets are not configured.\n"
            echo "Set these repository secrets (Settings > Secrets and variables > Actions):"
            echo "  STORE_FILE     - Base64 of the release keystore (JKS): base64 -i app/release.jks"
            echo "  STORE_PASSWORD - Key store password"
            echo "  KEY_ALIAS      - Key alias"
            echo "  KEY_PASSWORD   - Key password"
            exit 1
          fi

      - name: Build signed release
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 -d > app/release.jks
          export STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"
          export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
          export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          ./gradlew --no-daemon --stacktrace --warning-mode=all assembleRelease
          cp -f app/build/outputs/apk/release/app-release.apk "${{ env.artifact }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ env.artifact }}

      # Create as a DRAFT and upload the asset first — GitHub "immutable releases"
      # forbids adding assets after a release is published, so it must be attached
      # while the release is still a draft, then published in the next step.
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.tag }}
          name: ${{ env.tag }}
          draft: true
          prerelease: ${{ env.prerelease }}
          make_latest: ${{ env.makeLatest }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ env.artifact }}
          body: |
            Automated signed build from `${{ github.sha }}`.

            - Module version: ${{ env.versionName }} (${{ env.versionCode }})
            - Supported LINE version: ${{ env.LINE_versionName }} (${{ env.LINE_versionCode }})

            Verify build provenance:
            ```
            gh attestation verify ${{ env.artifact }} --repo ${{ github.repository }}
            ```

      # Publishing a draft that already has its asset attached is allowed under
      # immutable releases; the release becomes immutable at this point.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ env.tag }}" --draft=false --repo ${{ github.repository }}
